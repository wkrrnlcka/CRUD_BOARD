<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>회원가입</title>
</head>
<body>

<h1>회원가입</h1>

<form action="/signup" method="post">

    <div>
        <input type="text"
               name="username"
               placeholder="아이디">
    </div>

    <br>

    <div>
        <input type="password"
               name="password"
               placeholder="비밀번호">
    </div>

    <br>

    <button type="submit">
        회원가입
    </button>

</form>

</body>
</html>
